<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__EXTENSION_NAME__ — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9fafb; color: #111827; line-height: 1.5; }
    .container { max-width: 600px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; }
    .section { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #374151; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 4px; }
    .field input[type="text"], .field select { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.875rem; }
    .field input[type="checkbox"] { margin-right: 8px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 500; }
    .btn-primary { background: #2563EB; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .status-msg { font-size: 0.875rem; color: #059669; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ Settings</h1>

    <div class="section">
      <h2>General</h2>

      <div class="field">
        <div class="toggle-row">
          <label for="enabledToggle">Enable Extension</label>
          <input type="checkbox" id="enabledToggle" />
        </div>
      </div>

      <div class="field">
        <label for="themeSelect">Theme</label>
        <select id="themeSelect">
          <option value="auto">System Default</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
    </div>

    <div class="section">
      <h2>Notifications</h2>
      <div class="field">
        <div class="toggle-row">
          <label for="notifToggle">Enable Notifications</label>
          <input type="checkbox" id="notifToggle" />
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Advanced</h2>
      <div class="field">
        <label for="apiKey">API Key (optional)</label>
        <input type="text" id="apiKey" placeholder="Enter your API key" />
      </div>
    </div>

    <button id="saveBtn" class="btn btn-primary">Save Settings</button>
    <p id="saveStatus" class="status-msg">✓ Settings saved!</p>
  </div>

  <script src="options.js"></script>
</body>
</html>
